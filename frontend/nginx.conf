server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA. The try_files directive ensures that direct navigation
    # to client-side routes (e.g. /some-route) falls back to index.html instead
    # of returning a 404 from nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api requests to the Go API container.
    # Inside the Docker network, "go-api" resolves to the go-api service.
    # This avoids CORS issues: the browser always talks to the same origin (nginx on :80).
    location /api/ {
        proxy_pass http://go-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
