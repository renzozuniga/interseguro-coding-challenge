version: '3.9'

# ─── Shared configuration ────────────────────────────────────────────────────
x-jwt-secret: &jwt-secret
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string}

services:

  # ── Go API ─────────────────────────────────────────────────────────────────
  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    environment:
      <<: *jwt-secret
      PORT: "8080"
      # Docker service name "node-api" resolves inside the shared network.
      NODE_API_URL: "http://node-api:3000"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    ports:
      - "8080:8080"   # also expose directly for testing with curl/Postman
    depends_on:
      node-api:
        condition: service_healthy
    networks:
      - challenge-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Node.js API ────────────────────────────────────────────────────────────
  node-api:
    build:
      context: ./node-api
      dockerfile: Dockerfile
    environment:
      <<: *jwt-secret
      PORT: "3000"
    # Port 3000 is intentionally NOT published to the host — this service is
    # internal only, reachable solely by go-api over the Docker network.
    networks:
      - challenge-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      go-api:
        condition: service_healthy
    networks:
      - challenge-network
    restart: unless-stopped

networks:
  challenge-network:
    driver: bridge
